services:
  _defaults:
    autowire: true
    autoconfigure: true

  Ipedis\Bundle\Rabbit\:
    resource: '../../src/*'
    exclude: '../../src/{DependencyInjection,Entity,RabbitKernel.php}'


  Ipedis\Rabbit\Channel\Factory\ChannelFactory:
    arguments:
      $protocolVersion: "%ipedis_rabbit.protocol_version%"
      $serviceName: "%ipedis_rabbit.service_name%"

  Ipedis\Bundle\Rabbit\Service\Container\WorkerContainer:
    arguments: [!tagged_iterator { tag: 'ipedis_rabbit.worker', index_by: 'key' }]

  Ipedis\Bundle\Rabbit\Service\Connectable\OrderConnectable:
    abstract: true
    arguments:
      $connectionConfig: "%ipedis_rabbit.connection%"
      $exchangeConfig: "%ipedis_rabbit.order%"
      $channelFactory: '@Ipedis\Rabbit\Channel\Factory\ChannelFactory'
      $messagePayloadValidator: '@Ipedis\Bundle\Rabbit\Service\Validator\MessagePayloadValidator'

  Ipedis\Bundle\Rabbit\Service\Connectable\EventConnectable:
    abstract: true
    arguments:
      $connectionConfig: "%ipedis_rabbit.connection%"
      $exchangeConfig: "%ipedis_rabbit.event%"
      $channelFactory: '@Ipedis\Rabbit\Channel\Factory\ChannelFactory'
      $messagePayloadValidator: '@Ipedis\Bundle\Rabbit\Service\Validator\MessagePayloadValidator'

  Ipedis\Bundle\Rabbit\Service\Dispatcher\EventDispatcher:
    parent: Ipedis\Bundle\Rabbit\Service\Connectable\EventConnectable
    autoconfigure: false
    autowire: true

  Ipedis\Bundle\Rabbit\Service\Manager\OrderManager:
    parent: Ipedis\Bundle\Rabbit\Service\Connectable\OrderConnectable
    autoconfigure: false
    autowire: true

  Ipedis\Bundle\Rabbit\Service\Manager\WorkflowManager:
    parent: Ipedis\Bundle\Rabbit\Service\Connectable\OrderConnectable
    autoconfigure: false
    autowire: true

  Ipedis\Bundle\Rabbit\Service\Validator\MessagePayloadValidator:
    arguments:
      $validatorConfig: "%ipedis_rabbit.validation%"
      $currentEnv: "%kernel.environment%"
      $orderConfig: "%ipedis_rabbit.order%"

  Ipedis\Bundle\Rabbit\Service\Logger\RabbitEventLogger:
    arguments:
      $logger: '@monolog.logger.rabbit'
