services:
  _defaults:
    autowire: true
    autoconfigure: true

  Ipedis\Bundle\Rabbit\:
    resource: '../../src/*'
    exclude: '../../src/{DependencyInjection,Entity,RabbitKernel.php}'

  _instanceof:
    Ipedis\Bundle\Rabbit\Service\Contract\ProcessInterface:
      tags: ['ipedis_rabbit.worker']


  Ipedis\Bundle\Rabbit\Service\Container\WorkerContainer:
    arguments:
      - !tagged_iterator ipedis_rabbit.worker


  Ipedis\Bundle\Rabbit\Service\Connectable\OrderConnectable:
    abstract: true
    arguments:
      $connectionConfig: "%ipedis_rabbit.connection%"
      $exchangeConfig: "%ipedis_rabbit.order%"

  Ipedis\Bundle\Rabbit\Service\Connectable\EventConnectable:
    abstract: true
    arguments:
      $connectionConfig: "%ipedis_rabbit.connection%"
      $exchangeConfig: "%ipedis_rabbit.event%"
