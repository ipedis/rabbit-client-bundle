services:
  _defaults:
    autowire: true
    autoconfigure: true

  Ipedis\Bundle\Rabbit\Service\Connectable:
    abstract: true
    arguments:
      $host: "%rabbit.connection.host%"
      $port: "%rabbit.connection.port%"
      $user: "%rabbit.connection.user%"
      $password: "%rabbit.connection.password%"
      $exchange: "%rabbit.order.exchange%"
      $type: "%rabbit.order.type%"